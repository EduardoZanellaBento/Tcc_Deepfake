# =============================================================================
# CONFIGURAÇÃO CENTRAL DO EXPERIMENTO
# Todo parâmetro metodológico mora aqui. Quando a banca perguntar "qual sample
# rate? quantos MFCCs? qual a semente?", a resposta está neste arquivo.
# =============================================================================

semente: 42          # reprodutibilidade: mesma semente => mesmos splits/resultados

dataset:
  nome: "ASVspoof2021_LA_eval"
  caminho_audios: "data/raw/ASVspoof2021_LA_eval/flac"
  caminho_chaves: "data/raw/keys/LA/CM/trial_metadata.txt"  # labels (bonafide/spoof)
  # TODO [DECISÃO METODOLÓGICA — Eduardo + Prof. Anderson]
  # O total de 181.566 NÃO é o conjunto eval: é eval(148.176) + progress(16.464) +
  # hidden(16.926). O subconjunto 'hidden' == 'only_speech' (silêncio pré-cortado),
  # pré-processamento distinto do restante (notrim), o que confunde a análise de
  # prop_fala. O conjunto oficialmente pontuado do ASVspoof 2021 LA é fase=='eval'.
  # Recomendação registrada: filtrar para fase=='eval' (148.176, notrim).
  # NÃO filtrar automaticamente — decisão do orientador. Ver diagnostico_composicao_dataset.py.
  # Subamostragem estratificada: eval completo (181.566); sem subamostragem, para aderir ao protocolo do ASVspoof 2021.
  # Mantém a proporção real/sintético do conjunto original.
  usar_subamostra: false

modelos:
  svm:
    # TODO [DECISÃO METODOLÓGICA — Eduardo + Prof. Anderson, PENDENTE]
    # SVM-RBF é O(n^2)~O(n^3); ~127k amostras de treino são inviáveis (matriz de kernel
    # > 60GB). Recomendação registrada: subamostra estratificada ÚNICA (~30k) por
    # classe_binaria × codec, seed 42, salva em disco, COMPARTILHADA por RF, SVM e CNN,
    # para preservar o "mesmo ambiente experimental" da pergunta de pesquisa.
    # Evidência de suficiência: scripts/curva_aprendizado_rf.py.
    # NÃO implementar o ramo de subamostra até a decisão. Split de val/teste ficam
    # SEMPRE completos.
    tamanho_subamostra: 30000
  
audio:
  sample_rate: 16000   # Hz. ASVspoof é 16kHz. Manter alto preserva artefatos de alta freq.
  duracao_segundos: 4.0  # padroniza duração (corta/preenche). Define janela fixa de entrada.
  vad: true            # remoção de silêncio (Voice Activity Detection)

features:                # parâmetros das características manuais (RF e SVM)
  # TODO [DECISÃO METODOLÓGICA — Eduardo + Prof. Anderson]
  # fmax=4000 GLOBAL está REJEITADO pela composição do dataset:
  #   banda estreita (teto 4kHz): alaw, ulaw, gsm, pstn  -> 57%
  #   banda larga  (>4kHz):       g722, opus, none        -> 43%
  # Filtrar tudo em 4kHz destruiria sinal real em 43% dos dados, justamente a banda
  # alta onde vivem os artefatos de síntese. Decisão: NÃO filtrar globalmente e
  # reportar métrica POR CODEC (ver scripts/diagnostico_por_codec.py).
  # NÃO alterar fmax e NÃO re-extrair sem decisão explícita.
  # Estado atual: nenhum fmax é passado ao librosa — o MFCC usa o default
  # (fmax = sr/2 = 8000 Hz). O features.csv em disco foi extraído assim.
  n_mfcc: 20           # nº de coeficientes MFCC
  n_fft: 512           # tamanho da FFT
  hop_length: 256      # passo entre janelas
  win_length: 400      # ~25ms a 16kHz (janelamento)
  # Por áudio guardamos média + desvio-padrão de cada feature ao longo do tempo,
  # transformando uma série temporal num vetor de tamanho fixo (entrada tabular).
  agregacao: ["media", "desvio_padrao"]

espectrograma:           # entrada da CNN
  tipo: "mel"          # "mel" (mel-spectrogram) ou "linear"
  n_mels: 128
  altura: 128          # dimensões da "imagem" que entra na CNN
  largura: 256

split:
  treino: 0.70
  validacao: 0.15
  teste: 0.15
  estratificado: true  # mantém proporção real/sintético em cada subconjunto

validacao_cruzada:
  tipo: "stratified_kfold"
  n_folds: 5

desbalanceamento:
  estrategia: "class_weights"   # penaliza mais o erro na classe minoritária (real)

tuning:
  metodo: "random_search"   # mais eficiente que grid search em espaços grandes
  n_iter: 30

metricas:
  - acuracia
  - precisao
  - recall
  - f1
  - eer                # Equal Error Rate — métrica padrão da literatura ASVspoof
  - tempo_inferencia   # viabilidade computacional (diferencial do trabalho)

# =============================================================================
# DECISÃO METODOLÓGICA - protocolo de medição de tempo
# =============================================================================
# PROBLEMA: RF e SVM rodam em CPU; a CNN roda em GPU (RTX 5060 Ti 16GB, sm_120).
# Comparar 0,0017 ms/áudio de RF em CPU com uma CNN em GPU não é justo em nenhuma
# direção: medir tudo em CPU penaliza artificialmente a CNN, e medir cada um no
# seu hardware natural compara MÁQUINAS, não MODELOS.
#
# DECISÃO: reportar quatro medições.
#   (1) RF   — CPU
#   (2) SVM  — CPU
#   (3) CNN  — GPU  (melhor caso, hardware dedicado)
#   (4) CNN  — CPU  (hardware modesto, sem GPU)
#
# JUSTIFICATIVA: a vantagem dos modelos clássicos, na pergunta de pesquisa, não é
# serem mais rápidos em igualdade de hardware — é NÃO EXIGIREM GPU. O par (3)/(4)
# é o único arranjo que evidencia isso.
#
# REGRAS DE MEDIÇÃO (a serem implementadas quando o módulo de tempo for escrito):
#   - descartar as primeiras execuções (inicialização do contexto CUDA, carga de
#     kernels e autotune do cuDNN podem tornar a 1ª inferência 100x mais lenta);
#   - SEMPRE chamar torch.cuda.synchronize() ANTES e DEPOIS do trecho cronometrado
#     (CUDA é assíncrono: sem isso, mede-se o tempo de ENFILEIRAR, não de executar,
#     e a CNN parece milhares de vezes mais rápida do que é);
#   - medir latência (batch=1, cenário de uso real) E throughput (lote) separadamente;
#   - fixar n_jobs igual para todos os modelos clássicos e declarar qual foi;
#   - reportar mediana de N execuções + mínimo e máximo, nunca medição única;
#   - registrar hardware e versões no JSON de resultados, como já é feito em
#     results/metricas/curva_aprendizado_rf.json.
#
# incluir_extracao_features: medir também o pipeline COMPLETO (carregar + VAD +
#   extrair features/gerar espectrograma + predizer), e não só o predict. O
#   predict do RF leva 0,0017 ms; a extração com librosa leva ordens de grandeza
#   mais. A hipótese é que o pré-processamento DOMINE o custo nos três modelos,
#   tornando a escolha do classificador quase irrelevante para o tempo de
#   inferência real. Se confirmado, é um achado de engenharia relevante para o TC II.
# =============================================================================
tempo:
  cenarios: ["cpu", "gpu"]
  repeticoes: 10
  descartar_aquecimento: 3
  medir_latencia: true        # batch = 1
  medir_throughput: true      # lote
  incluir_extracao_features: true
